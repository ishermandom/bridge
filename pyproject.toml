# A virtual workspace root: it holds no package of its own, only the shared
# lockfile/environment and the list of Python subprojects that share them.
# Each member's dependencies stay scoped to that member's own pyproject.toml.
# ruff and mypy are configured globally, so no [tool.ruff]/[tool.mypy] here —
# adding them would shadow that global config.

[tool.uv.workspace]
members = ["session_analysis", "convention_cards"]

[dependency-groups]
dev = ["pytest", "types-reportlab"]

[tool.pytest.ini_options]
# Tests are named <module>_test.py, beside the module they cover.
python_files = ["*_test.py"]
