# Many users of this app are likely older with limited eyesight, so this uses
# a larger base font size than Streamlit's default. Dark mode is a deliberate
# choice by the app's owner (personal preference despite general legibility
# research favoring light for astigmatism/low-vision users) — left as
# Streamlit's own default dark palette rather than a custom one, since that
# default already avoids the harsher pure-black/pure-white extremes.

[theme]
base = "dark"
baseFontSize = 20
